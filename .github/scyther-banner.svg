<svg width="1200" height="200" viewBox="0 0 1200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Looking for the iOS version? Get Scyther for iOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12161C"/>
      <stop offset="1" stop-color="#0A0D11"/>
    </linearGradient>
    <radialGradient id="glow" cx="600" cy="40" r="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A84FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="1198" height="198" rx="18" fill="url(#bg)" stroke="#262B33" stroke-width="1.5"/>
